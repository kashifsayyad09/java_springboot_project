name: Deploy Streamlit Frontend to EC2

on:
  workflow_run:
    workflows:
      - Backend Build
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -eux

            APP_DIR=/home/ec2-user/front
            REPO_NAME=java_springboot_project
            REPO_URL=https://github.com/kashifsayyad09/java_springboot_project.git

            sudo dnf install -y git python3 python3-pip

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "Current directory:"
            pwd
            ls -la

            if [ -d "$REPO_NAME/.git" ]; then
              echo "Repository exists. Updating..."

              cd "$REPO_NAME"
              git fetch origin
              git reset --hard origin/main

            else
              echo "Repository not found. Cloning..."

              git clone "$REPO_URL" "$REPO_NAME"

              cd "$REPO_NAME"
            fi

            cd frontend

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt

            sudo tee /etc/systemd/system/frontend.service > /dev/null <<EOF
            [Unit]
            Description=Streamlit Frontend
            After=network.target

            [Service]
            User=ec2-user
            WorkingDirectory=/home/ec2-user/front/java_springboot_project/frontend

            Environment=API_URL=http://localhost:8084

            ExecStart=/home/ec2-user/front/java_springboot_project/frontend/venv/bin/streamlit run app.py --server.port=8501 --server.address=0.0.0.0

            Restart=always
            RestartSec=5

            StandardOutput=append:/home/ec2-user/frontend.log
            StandardError=append:/home/ec2-user/frontend-error.log

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable frontend
            sudo systemctl restart frontend

            sleep 5

            sudo systemctl status frontend --no-pager

            curl http://localhost:8501

            echo "✅ Frontend deployment completed successfully."
